spring:
  application:
    name: shopping-cart
  datasource:
    url: jdbc:postgresql://localhost:5432/shopping-cart-db
    username: postgres
    password: 267115

  jpa:
    hibernate:
#      ddl-auto: update
#            ddl-auto: create
      ddl-auto: validate
#      ddl-auto: none
#    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  flyway:
    enabled: true # Включение или отключение flyway
    locations: classpath:db/migration
    baseline-on-migrate: true
#    baseline-version: 1
#    validate-on-migrate: true
#    clean-disabled: false  # Разрешить очистку

logging:
  level:
    org.flywaydb: TRACE
    org.springframework.boot.autoconfigure.flyway: DEBUG
    org.springframework.jdbc.core: DEBUG
    root: INFO




