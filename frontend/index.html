<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
    <style>
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .auth-buttons {
            display: flex;
            gap: 10px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .product-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<!-- Header с навигацией -->
<header>
    <div class="logo">
        <h1>🛒 Shopping Cart</h1>
    </div>

    <div class="user-info">
        <div id="user-email" style="display: none;">
            Welcome, <span id="email-display"></span>
        </div>

        <div class="auth-buttons">
            <button id="login-btn" class="btn btn-outline">Login</button>
            <button id="logout-btn" class="btn btn-outline" style="display: none;">Logout</button>
        </div>
    </div>
</header>

<!-- Основной контент -->
<div class="container">
    <!-- Товары (показываем всегда) -->
    <section id="products-section">
        <h2>🛍️ Our Products</h2>
        <div id="products-list" class="product-grid">
            <p>Loading products...</p>
        </div>
    </section>

    <!-- Корзина (показываем только после логина) -->
    <section id="cart-section" style="display: none;">
        <h2>🛒 Your Cart</h2>
        <div id="cart-items"></div>
        <button id="checkout-btn" class="btn btn-primary">Checkout</button>
    </section>

    <!-- Баннер для неавторизованных -->
    <div id="auth-banner" class="banner" style="display: none;">
        <p>Login to add items to cart and checkout</p>
        <a href="login.html" class="btn btn-primary">Go to Login</a>
    </div>
</div>

<!-- Подключаем скрипты -->
<script src="auth.js"></script>
<script src="products.js"></script>
<script src="cart.js"></script>
<script src="app.js"></script>
</body>
</html>
