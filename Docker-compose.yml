services:
  shopping-cart-service:
    container_name: shopping-cart-service
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
    env_file:
      - ./.env
    depends_on:
      shopping-cart-service-db:
        condition: service_healthy
    restart: unless-stopped

    networks:
      - shopping-cart-network

  shopping-cart-service-db:
    container_name: shopping-cart-service-db
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_DB_EXTERNAL_PORT}:${POSTGRES_DB_INTERNAL_PORT}"
    env_file:
      - ./.env
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U $POSTGRES_USER -d $POSTGRES_DB'" ]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
    volumes:
      - shopping-cart-service-db:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - shopping-cart-network

volumes:
  shopping-cart-service-db:

networks:
  shopping-cart-network:
    driver: bridge